name: HackRadar Daily Pipeline

on:
  schedule:
    - cron: "0 11 * * *"   # 6am CT / 11am UTC
  workflow_dispatch:         # Allow manual triggers

concurrency:
  group: hackradar-pipeline
  cancel-in-progress: false  # Never cancel a running pipeline — let it finish

permissions:
  contents: write            # Needed to commit seen.json

jobs:
  run-pipeline:
    name: Run HackRadar Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
      EMAIL_TO: ${{ secrets.EMAIL_TO || secrets.EMAIL_ADDRESS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push back the seen.json commit
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python -m hackradar.main

      - name: Commit updated seen.json
        run: |
          git diff --quiet data/seen.json || (
            git config user.name "HackRadar Bot" &&
            git config user.email "hackradar@users.noreply.github.com" &&
            git add data/seen.json &&
            git commit -m "chore: update seen.json [skip ci]" &&
            git pull --rebase origin main &&
            git push
          )
